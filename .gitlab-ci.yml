stages:
  - test
  - build
  - publish

variables:
  NODE_VERSION: "20"

.node_setup: &node_setup
  image: node:${NODE_VERSION}
  before_script:
    - corepack enable

test:
  <<: *node_setup
  stage: test
  script:
    - pnpm install --frozen-lockfile --ignore-scripts
    - pnpm test
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

build:
  <<: *node_setup
  stage: build
  script:
    - pnpm install --frozen-lockfile
    - pnpm typecheck
    - pnpm build
    - pnpm zip
    - cp .output/*.zip .output/catalog-migration-tool-chrome.zip
  artifacts:
    paths:
      - .output/catalog-migration-tool-chrome.zip
    expire_in: 30 days
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

release:
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  stage: build
  needs:
    - job: test
    - job: build
      artifacts: true
  script:
    - echo "Releasing ${CI_COMMIT_TAG}"
  release:
    tag_name: $CI_COMMIT_TAG
    description: "Release $CI_COMMIT_TAG"
    assets:
      links:
        - name: "Chrome Extension ZIP"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/.output/catalog-migration-tool-chrome.zip?job=build"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

publish_to_chrome_store:
  stage: publish
  image: alpine:latest
  needs:
    - job: build
      artifacts: true
  before_script:
    - apk add --no-cache curl jq
  script:
    # Get access token from refresh token
    - |
      TOKEN_RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
        -d "client_id=${CWS_CLIENT_ID}" \
        -d "client_secret=${CWS_CLIENT_SECRET}" \
        -d "refresh_token=${CWS_REFRESH_TOKEN}" \
        -d "grant_type=refresh_token")
      ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')
      if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
        echo "Failed to get access token:"
        echo "$TOKEN_RESPONSE" | jq .
        exit 1
      fi
    # Upload the zip to Chrome Web Store
    - |
      UPLOAD_RESULT=$(curl -s -X PUT \
        "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${CWS_EXTENSION_ID}" \
        -H "Authorization: Bearer ${ACCESS_TOKEN}" \
        -H "x-goog-api-version: 2" \
        -T .output/catalog-migration-tool-chrome.zip)
      echo "Upload result:"
      echo "$UPLOAD_RESULT" | jq .
      UPLOAD_STATUS=$(echo "$UPLOAD_RESULT" | jq -r '.uploadState')
      if [ "$UPLOAD_STATUS" = "FAILURE" ]; then
        echo "Upload failed"
        exit 1
      fi
    # Publish the uploaded version
    - |
      PUBLISH_RESULT=$(curl -s -X POST \
        "https://www.googleapis.com/chromewebstore/v1.1/items/${CWS_EXTENSION_ID}/publish" \
        -H "Authorization: Bearer ${ACCESS_TOKEN}" \
        -H "x-goog-api-version: 2" \
        -H "Content-Length: 0")
      echo "Publish result:"
      echo "$PUBLISH_RESULT" | jq .
      PUBLISH_STATUS=$(echo "$PUBLISH_RESULT" | jq -r '.status[0]')
      if [ "$PUBLISH_STATUS" != "OK" ] && [ "$PUBLISH_STATUS" != "PUBLISHED_WITH_FRICTION_WARNING" ]; then
        echo "Publish failed with status: $PUBLISH_STATUS"
        exit 1
      fi
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
