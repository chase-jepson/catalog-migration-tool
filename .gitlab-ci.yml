stages:
  - test
  - build

variables:
  NODE_VERSION: "20"

.node_setup: &node_setup
  image: node:${NODE_VERSION}
  before_script:
    - corepack enable

test:
  <<: *node_setup
  stage: test
  script:
    - pnpm install --frozen-lockfile --ignore-scripts
    - pnpm test
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

build:
  <<: *node_setup
  stage: build
  script:
    - pnpm install --frozen-lockfile
    - pnpm typecheck
    - pnpm build
    - pnpm zip
  artifacts:
    paths:
      - .output/*.zip
    expire_in: 30 days
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

release:
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  stage: build
  needs:
    - job: test
    - job: build
      artifacts: true
  script:
    - echo "Releasing ${CI_COMMIT_TAG}"
  release:
    tag_name: $CI_COMMIT_TAG
    description: "Release $CI_COMMIT_TAG"
    assets:
      links:
        - name: "Chrome Extension ZIP"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/.output/catalog-migration-tool-${CI_COMMIT_TAG#v}-chrome.zip?job=build"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
